<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <script>
    // GitHub Pages SPA 路由回退
    // 将 404 路径转为 query 参数，由 index.html 还原
    var seg = location.pathname.split('/').length - 1
    var path = location.pathname.slice(1).split('/').slice(seg > 1 ? 1 : 0).join('/')
    location.replace(
      location.origin + '/xiaoyu-ziying/' +
      '?p=/' + path +
      (location.search ? '&' + location.search.slice(1) : '') +
      location.hash
    )
  </script>
</head>
</html>
